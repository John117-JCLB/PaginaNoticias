<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Noticia | RASTRO CHIMBOTE</title>

    <!-- Iconos -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<!-- HEADER -->

<header class="admin-header">

    <h1>
        <i class="fas fa-newspaper"></i>
        RASTRO CHIMBOTE
    </h1>

    <a href="dashboard.html" class="btn-sitio">
        <i class="fas fa-arrow-left"></i>
        Volver al Panel
    </a>

</header>

<!-- CONTENIDO -->

<main class="admin-container">

    <h2>Publicar Nueva Noticia</h2>

    <form class="admin-form">

        <label>Título de la noticia</label>

        <input
                type="text"
                placeholder="Ingrese el título de la noticia"
                required>

        <label>Categoría</label>

        <select required>

            <option value="">Seleccione una categoría</option>
            <option>Policiales</option>
            <option>Vecinales</option>
            <option>Universidad</option>
            <option>Denuncias</option>

        </select>

        <label>Autor</label>

        <input
                type="text"
                placeholder="Nombre del autor">

        <label>Fecha</label>

        <input type="date">

        <label>Resumen</label>

        <textarea
                rows="4"
                placeholder="Breve descripción de la noticia"></textarea>

        <label>Contenido Completo</label>

        <textarea
                rows="10"
                placeholder="Escriba aquí toda la noticia..."></textarea>

        <label>Imagen Principal</label>

        <input type="file">

        <button type="submit">

            <i class="fas fa-upload"></i>
            Publicar Noticia

        </button>

    </form>

</main>

<script src="../js/storage.js"></script>
<script src="../js/noticias.js"></script>
</body>
</html>
